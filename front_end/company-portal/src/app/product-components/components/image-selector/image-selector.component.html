<div class="p-6">
  <div class="flex flex-col gap-6">

    <!-- Upload Column -->
    <div>
      <h3 class="text-lg font-bold mb-4">Upload New Image</h3>
      <!-- Upload Section -->
      <div class="flex flex-col items-center justify-center p-4 border-2 border-dashed border-base-300 rounded-lg min-h-[200px] bg-base-200">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12 text-base-content opacity-30 mb-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l-3 3m3-3l3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
        </svg>
        <label for="image-upload" class="btn btn-primary" [class.loading]="uploading">
          {{ uploading ? 'Uploading...' : 'Choose a file' }}
        </label>
        <input id="image-upload" type="file" (change)="onFileInput($event)" accept="image/png, image/jpeg, image/gif" class="hidden" [disabled]="uploading" />
      </div>

      <!-- Upload Progress -->
      <div *ngIf="uploading" class="mt-4 space-y-2">
        <progress class="progress progress-primary w-full" [value]="uploadProgress" max="100"></progress>
        <p class="text-center text-sm mt-1">{{ uploadProgress }}%</p>
      </div>

      <!-- Upload Status Messages -->
      <div *ngIf="successMessage" class="alert alert-success shadow-lg mt-4 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current flex-shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        <span>{{ successMessage }}</span>
      </div>
      <div *ngIf="uploadError" class="alert alert-error shadow-lg mt-4 text-sm">
        <svg xmlns="http://www.w3.org/2000/svg" class="stroke-current flex-shrink-0 h-6 w-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        <span>{{ uploadError }}</span>
      </div>
    </div>

    <div class="divider">OR</div>
    
    <!-- Gallery Column -->
    <div>
      <h3 class="text-lg font-bold mb-4">Select Existing</h3>
      <!-- Loading Skeletons -->
      <div *ngIf="isLoading" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4">
        <div *ngFor="let i of [1,2,3,4,5,6]" class="skeleton h-32 w-full"></div>
      </div>

      <!-- Image Grid -->
      <div *ngIf="!isLoading && images.length > 0" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4 max-h-[40vh] overflow-y-auto pr-2">
        <div *ngFor="let img of images"
             class="card bg-base-100 shadow-md hover:shadow-xl hover:outline hover:outline-primary hover:outline-2 transition-all duration-200 ease-in-out cursor-pointer"
             (click)="choose(img)">
          <figure class="p-2 h-24 bg-base-200">
            <img [src]="img.url" [alt]="img.name" loading="lazy" class="h-full w-auto object-contain" />
          </figure>
          <div class="card-body p-2 bg-base-100">
            <p class="text-xs text-center truncate" [title]="img.name">{{ img.name }}</p>
          </div>
        </div>
      </div>

      <!-- No Images Message -->
      <div *ngIf="!isLoading && images.length === 0" class="text-center p-8 opacity-75 min-h-[200px] flex flex-col justify-center items-center bg-base-200 rounded-lg">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-12 h-12 text-base-content opacity-30 mb-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
        </svg>
        <p>No images found in your media library.</p>
        <p class="text-sm">Upload one to get started.</p>
      </div>
    </div>
  </div>
</div>
