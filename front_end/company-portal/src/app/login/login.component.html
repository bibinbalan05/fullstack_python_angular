<div
  class="flex justify-center items-center min-h-screen bg-base-200 px-4 py-8"
>
  <div class="card w-full max-w-md bg-base-100 shadow-xl">
    <div class="card-body">
      <h2 class="card-title text-3xl font-bold justify-center mb-6">Log In</h2>

      <form (ngSubmit)="onLogin()" class="space-y-4">
        <div>
          <label
            for="email"
            class="block text-sm font-medium mb-1 text-base-content"
            >E-mail</label
          >
          <input
            type="email"
            id="email"
            [(ngModel)]="email"
            name="email"
            required
            class="input input-bordered w-full"
          />
        </div>

        <div>
          <label
            for="password"
            class="block text-sm font-medium mb-1 text-base-content"
            >Password</label
          >
          <input
            type="password"
            id="password"
            [(ngModel)]="password"
            name="password"
            required
            class="input input-bordered w-full"
          />
        </div>

        <p
          *ngIf="errorMessage"
          class="text-sm text-error font-medium text-center pt-2"
        >
          {{ errorMessage }}
        </p>

        <div class="pt-4">
          <button
            type="submit"
            class="btn btn-primary w-full"
            [disabled]="isLoading"
          >
            <span *ngIf="!isLoading">Log In</span>
            <div [ngClass]="{ loading: isLoading }"></div>
          </button>
        </div>

        <div class="text-center mt-4 flex flex-col">
          <a routerLink="/password-reset" class="link link-hover font-bold">
            Forgot your password? Reset Password
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
