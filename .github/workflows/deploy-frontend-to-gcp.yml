name: Deploy Frontend to GCP Cloud Run

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  GAR_LOCATION: europe-west1
  SERVICE: archr-frontend
  REGION: europe-west1

jobs:
  deploy:
    permissions:
      contents: read
      id-token: write

    runs-on: ubuntu-latest
    # Only run on push to master or manually
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
          service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'

      - name: Docker Auth
        id: docker-auth
        uses: docker/login-action@v3
        with:
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

      - name: Build and Push Container
        run: |-
          cd front_end/company-portal
          docker build -t "europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archr-frontend/archr-frontend:${{ github.sha }}" ./
          docker push "europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archr-frontend/archr-frontend:${{ github.sha }}"

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/archr-frontend/archr-frontend:${{ github.sha }}
          flags: '--cpu=1 --memory=512Mi --max-instances=10 --min-instances=0 --concurrency=1000 --port=8080 --ingress=all --allow-unauthenticated'
          env_vars: |
            API_URL=https://api.archr.se

      - name: Show Output
        run: echo ${{ steps.deploy.outputs.url }}
